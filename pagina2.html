<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Men Cómic - Página 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="comic-page page-2">

        <div class="panel p2-1 magneto-background">
            <p class="narrative-box top-right">"No es una falla, Xavier..."</p>
            <img src="https://via.placeholder.com/620x620/34495e/ffffff?text=Magneto" alt="Magneto">
            <div class="speech-bubble bottom-left">"¡Es una ADVERTENCIA! Mis aliados han tomado el control."</div>
        </div>

        <div class="panel p2-2 rogue-background">
            <img src="https://via.placeholder.com/300x300/27ae60/ffffff?text=Rogue" alt="Rogue">
            <div class="speech-bubble right">"¡Wolverine está herido!"</div>
        </div>

        <div class="panel p2-3 gambit-background">
            <img src="https://via.placeholder.com/300x300/d35400/ffffff?text=Gambit" alt="Gambit">
            <div class="sound-effect red">¡KLIK!</div>
            <div class="speech-bubble left">"Cargando cartas, amigo."</div>
        </div>

        <div class="panel p2-4 beast-background">
            <img src="https://via.placeholder.com/300x300/2980b9/ffffff?text=Beast" alt="Beast">
            <div class="speech-bubble top-right">"¡El Profesor está en peligro! El sistema de soporte vital es crítico."</div>
        </div>

        <div class="panel p2-5 xavier-background">
            <img src="https://via.placeholder.com/300x300/7f8c8d/ffffff?text=Xavier" alt="Xavier">
            <div class="thought-bubble left">"Debo encontrar la fuerza... ¡Cerebro!"</div>
        </div>

    </main>

    <div class="page-navigation">
        <a href="pagina1.html" class="nav-button">Volver a la Página 1</a>
        <p>Página 2 de 2</p>
    </div>

</body>
</html>
