<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Men Cómic - Página 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="comic-page page-1">

        <div class="panel p1-1 instituto-background">
            <p class="narrative-box top-left">Instituto Xavier para Jóvenes Talentos.</p>
            <img src="https://via.placeholder.com/300x300/e74c3c/ffffff?text=X-Mansion" alt="Instituto Xavier">
            <div class="speech-bubble right">"Logan... algo está mal en el Danger Room."</div>
        </div>

        <div class="panel p1-2 cyclops-background">
            <img src="https://via.placeholder.com/300x300/3498db/ffffff?text=Cyclops" alt="Cyclops">
            <div class="speech-bubble left">"Los sistemas se están sobrecargando. ¡Necesitamos apoyo!"</div>
        </div>

        <div class="panel p1-3 storm-background">
            <img src="https://via.placeholder.com/300x300/bdc3c7/ffffff?text=Storm" alt="Storm">
            <div class="speech-bubble right">"Estoy en camino. ¡Tormentas, a mí!"</div>
        </div>

        <div class="panel p1-4 wolverine-background">
            <img src="https://via.placeholder.com/300x300/f1c40f/ffffff?text=Wolverine" alt="Wolverine">
            <div class="speech-bubble left">"¡No tenemos tiempo! Voy a entrar."</div>
        </div>

        <div class="panel p1-5 danger-room-background">
            <img src="https://via.placeholder.com/300x300/8e44ad/ffffff?text=Danger+Room" alt="Danger Room">
            <p class="narrative-box top-left">El Danger Room se vuelve inestable...</p>
        </div>

        <div class="panel p1-6 scream-background">
            <img src="https://via.placeholder.com/300x300/c0392b/ffffff?text=SCREAM" alt="Scream">
            <div class="sound-effect">¡¡AAAARGH!!</div>
        </div>

    </main>

    <div class="page-navigation">
        <p>Página 1 de 2</p>
        <a href="pagina2.html" class="nav-button">Ver Página 2</a>
    </div>

</body>
</html>
